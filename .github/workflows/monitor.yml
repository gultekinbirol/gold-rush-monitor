name: Gold Rush Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - name: Kontrol
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check.py
